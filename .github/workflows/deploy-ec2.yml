name: Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - atlas-ec2
    timeout-minutes: 20
    env:
      DEPLOY_PATH: /srv/atlas/app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate local deploy target
        run: |
          test -d "$DEPLOY_PATH" || { echo "Diretorio de deploy ausente: $DEPLOY_PATH"; exit 1; }
          test -f "$DEPLOY_PATH/.env.production" || { echo ".env.production ausente em $DEPLOY_PATH"; exit 1; }

      - name: Sync repository to EC2 app dir
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude ".env.production" \
            --exclude ".env.omnichannel" \
            --exclude "app/node_modules/" \
            --exclude "app/dist/" \
            --exclude "app/workspace/.agent-state/" \
            --exclude "upstream/" \
            ./ "$DEPLOY_PATH/"

      - name: Run local deploy
        run: |
          cd "$DEPLOY_PATH"
          chmod +x scripts/deploy-ec2.sh
          ATLAS_APP_DIR="$DEPLOY_PATH" scripts/deploy-ec2.sh

      - name: Notify Telegram success
        if: ${{ success() }}
        run: |
          BOT_TOKEN="$(awk -F= '/^TELEGRAM_BOT_TOKEN=/{print substr($0, index($0, $2)); exit}' "$DEPLOY_PATH/.env.production")"
          CHAT_ID="$(awk -F= '/^TELEGRAM_ALLOWED_USER_IDS=/{print $2; exit}' "$DEPLOY_PATH/.env.production" | cut -d',' -f1 | tr -d '[:space:]')"

          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram deploy notification skipped: config ausente no .env.production."
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MESSAGE=$(cat <<EOF
✅ Deploy Atlas
Repo: $GITHUB_REPOSITORY
Branch: $GITHUB_REF_NAME
Status: success
Commit: $SHORT_SHA
Run: $RUN_URL
EOF
)

          RESPONSE="$(curl -sS --max-time 20 \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MESSAGE" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" || true)"

          if ! printf '%s' "$RESPONSE" | grep -q '"ok":true'; then
            echo "Telegram deploy notification failed."
            echo "$RESPONSE"
            exit 0
          fi

          echo "Telegram deploy notification sent."

      - name: Notify Telegram failure
        if: ${{ failure() }}
        run: |
          BOT_TOKEN="$(awk -F= '/^TELEGRAM_BOT_TOKEN=/{print substr($0, index($0, $2)); exit}' "$DEPLOY_PATH/.env.production")"
          CHAT_ID="$(awk -F= '/^TELEGRAM_ALLOWED_USER_IDS=/{print $2; exit}' "$DEPLOY_PATH/.env.production" | cut -d',' -f1 | tr -d '[:space:]')"

          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram deploy notification skipped: config ausente no .env.production."
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MESSAGE=$(cat <<EOF
❌ Deploy Atlas
Repo: $GITHUB_REPOSITORY
Branch: $GITHUB_REF_NAME
Status: failure
Commit: $SHORT_SHA
Run: $RUN_URL
EOF
)

          RESPONSE="$(curl -sS --max-time 20 \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MESSAGE" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" || true)"

          if ! printf '%s' "$RESPONSE" | grep -q '"ok":true'; then
            echo "Telegram deploy notification failed."
            echo "$RESPONSE"
            exit 0
          fi

          echo "Telegram deploy notification sent."
