name: Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_PATH: /srv/atlas/app
      EC2_HOST: 16.59.231.206
      EC2_PORT: "22"
      EC2_USER: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Validate app before deploy
        working-directory: app
        run: |
          npm run typecheck
          npm run build
          npm run eval:release-gate

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          cat > "$HOME/.ssh/atlas_ec2_key" <<'KEY'
          ${{ secrets.AWS_EC2_SSH_KEY }}
          KEY
          chmod 600 "$HOME/.ssh/atlas_ec2_key"
          touch "$HOME/.ssh/known_hosts"

      - name: Validate remote deploy target
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/atlas_ec2_key" \
            -p "$EC2_PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            "$EC2_USER@$EC2_HOST" \
            "test -d '$DEPLOY_PATH' && test -f '$DEPLOY_PATH/.env.production'"

      - name: Sync repository to EC2 app dir
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/atlas_ec2_key -p $EC2_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude ".env.production" \
            --exclude ".env.omnichannel" \
            --exclude "app/node_modules/" \
            --exclude "app/dist/" \
            --exclude "app/workspace/.agent-state/" \
            ./ "$EC2_USER@$EC2_HOST:$DEPLOY_PATH/"

      - name: Run remote deploy
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/atlas_ec2_key" \
            -p "$EC2_PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            "$EC2_USER@$EC2_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x scripts/deploy-ec2.sh && ATLAS_APP_DIR='$DEPLOY_PATH' scripts/deploy-ec2.sh"
