name: WhatsApp Monitor Smoke

on:
  workflow_dispatch:
    inputs:
      instance:
        description: Evolution instance name
        required: true
        default: atlas_institucional
      sender_number:
        description: Synthetic sender number (digits only)
        required: true
        default: "5551999999998"
      sender_name:
        description: Synthetic sender display name
        required: true
        default: Smoke Monitor
      message:
        description: Synthetic inbound message
        required: true
        default: "[SMOKE] Paulo, amanhã temos reunião às 9h no CREAS."

jobs:
  smoke:
    runs-on:
      - self-hosted
      - atlas-ec2
    timeout-minutes: 10
    env:
      DEPLOY_PATH: /srv/atlas/app
      INSTANCE: ${{ github.event.inputs.instance || 'atlas_institucional' }}
      SENDER_NUMBER: ${{ github.event.inputs.sender_number || '5551999999998' }}
      SENDER_NAME: ${{ github.event.inputs.sender_name || 'Smoke Monitor' }}
      MESSAGE_TEXT: ${{ github.event.inputs.message || '[SMOKE] Paulo, amanhã temos reunião às 9h no CREAS.' }}
    steps:
      - name: Validate target
        run: |
          set -euo pipefail
          test -d "$DEPLOY_PATH" || { echo "Diretorio ausente: $DEPLOY_PATH"; exit 1; }
          test -f "$DEPLOY_PATH/.env.production" || { echo ".env.production ausente em $DEPLOY_PATH"; exit 1; }

      - name: Post synthetic webhook payload to sidecar
        run: |
          set -euo pipefail
          sudo docker exec \
            -i \
            -e "INSTANCE=$INSTANCE" \
            -e "SENDER_NUMBER=$SENDER_NUMBER" \
            -e "SENDER_NAME=$SENDER_NAME" \
            -e "MESSAGE_TEXT=$MESSAGE_TEXT" \
            atlas-whatsapp-sidecar \
            node --input-type=module - <<'NODE'
          const payload = {
            instance: process.env.INSTANCE,
            key: {
              remoteJid: `${process.env.SENDER_NUMBER}@s.whatsapp.net`,
              fromMe: false,
              id: "SMOKE-WHATSAPP-MONITOR",
            },
            pushName: process.env.SENDER_NAME,
            messageType: "conversation",
            message: {
              conversation: process.env.MESSAGE_TEXT,
            },
            date_time: "2026-04-17T22:00:00.000Z",
          };

          const response = await fetch("http://127.0.0.1:8790/webhooks/evolution", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const body = await response.text();
          if (!response.ok) {
            throw new Error(`Webhook smoke failed (${response.status}): ${body}`);
          }
          console.log(body);
          NODE

      - name: Wait for side effects
        run: sleep 3

      - name: Inspect persisted records and logs
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          base = Path("/srv/atlas/state/workspace/.agent-state")
          outputs = {}

          db_specs = {
              "whatsapp_messages": (
                  base / "whatsapp-messages.sqlite",
                  "select id, instance_name, number, push_name, direction, substr(text, 1, 160) as text, created_at from whatsapp_messages order by id desc limit 5",
              ),
              "approval_inbox": (
                  base / "approval-inbox.sqlite",
                  "select id, channel, action_kind, subject, status, created_at from approval_inbox order by id desc limit 5",
              ),
          }

          for name, (path, query) in db_specs.items():
              conn = sqlite3.connect(path)
              conn.row_factory = sqlite3.Row
              try:
                  rows = [dict(row) for row in conn.execute(query).fetchall()]
              finally:
                  conn.close()
              outputs[name] = rows

          print(json.dumps(outputs, ensure_ascii=False, indent=2))
          PY

          echo
          echo "===== atlas-whatsapp-sidecar ====="
          sudo docker logs --tail 80 atlas-whatsapp-sidecar 2>&1 || true
          echo
          echo "===== atlas-core ====="
          sudo docker logs --tail 80 atlas-core 2>&1 || true
